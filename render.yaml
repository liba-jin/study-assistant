services:
  # Study Planner Agent
  - type: web
    name: studynet-planner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python deploy/planner_server.py
    envVars:
      - key: AGENT_ID
        value: studynet-planner
      - key: GROQ_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: PORT
        value: 6000
      - key: PUBLIC_URL
        value: "https://study-assistant-kjlw.onrender.com"
      - key: API_URL
        value: "https://study-assistant-kjlw.onrender.com"
      - key: IMPROVE_MESSAGES
        value: "false"     # Disable NANDA message rewriting — our agents do their own processing

  # Test/Teacher Agent
  - type: web
    name: studynet-tester
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python deploy/tester_server.py
    envVars:
      - key: AGENT_ID
        value: studynet-tester
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 6000
      - key: PUBLIC_URL
        value: "https://tester-yxtf.onrender.com"
      - key: API_URL
        value: "https://tester-yxtf.onrender.com"
      - key: IMPROVE_MESSAGES
        value: "false"
